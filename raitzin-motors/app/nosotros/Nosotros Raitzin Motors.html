<!DOCTYPE html>

  <title>Nosotros — Raitzin Motors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

      .team-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .cta-buttons { flex-direction: column !important; }
      h1.hero-title { font-size: clamp(36px, 8vw, 56px) !important; }

    @media (max-width: 600px) {
      .values-grid { grid-template-columns: 1fr !important; }
      .team-grid { grid-template-columns: 1fr !important; }

<body>
<div id="root"></div>

<script type="text/babel" src="catalog-components.jsx"></script>

<script type="text/babel">

const NAVY = "#1E2167";
const NAVY_DARK = "#151849";
const BURGUNDY = "#8B1A1A";
const SKY_BLUE = "#7EB8D4";
const WHATSAPP = "#25D366";
const SECTION_BG = "#F4F8FB";
const MUTED = "#5A6A7A";
const BORDER = "#E5E7EB";

const WA_HREF = "https://wa.me/5492944000000?text=Hola!%20Quer%C3%ADa%20consultarles";

// ─── Section Label ────────────────────────────────────────────────────────────

function Eyebrow({ children, dark }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
      <div style={{ width: 24, height: 2, background: dark ? SKY_BLUE : BURGUNDY }}></div>
      <span style={{
        color: dark ? SKY_BLUE : BURGUNDY, fontSize: 11, fontWeight: 700,
        letterSpacing: "0.16em", textTransform: "uppercase",
      }}>{children}</span>
    </div>
  );
}

// ─── Hero Section ─────────────────────────────────────────────────────────────

function Hero() {
  return (
    <section style={{
      background: "#0E1020", color: "#fff",
      paddingTop: "calc(64px + 96px)", paddingBottom: 120,
      position: "relative", overflow: "hidden",
    }}>
      {/* Grid pattern */}
      <div style={{
        position: "absolute", inset: 0, opacity: 0.04,
        backgroundImage: `repeating-linear-gradient(0deg, #fff 0, #fff 1px, transparent 1px, transparent 64px),

        pointerEvents: "none",
      }}/>
      {/* Sky blue radial glow */}
      <div style={{
        position: "absolute", top: "-20%", right: "-10%",
        width: 720, height: 720, borderRadius: "50%",
        background: `radial-gradient(circle, ${SKY_BLUE} 0%, transparent 60%)`,
        opacity: 0.1, filter: "blur(20px)",
        pointerEvents: "none",
      }}/>

      <div style={{ position: "relative", maxWidth: 1180, margin: "0 auto", padding: "0 24px" }}>
        <Eyebrow dark>San Carlos de Bariloche · Patagonia</Eyebrow>
        <h1 className="hero-title" style={{
          margin: 0,
          fontSize: "clamp(40px, 7vw, 84px)",
          fontWeight: 800, letterSpacing: "-0.03em", lineHeight: 1.02,

          Trabajamos para que cambiar de auto sea simple, claro y sin sorpresas.
        </p>
      </div>
    </section>
  );
}

// ─── Historia Section ─────────────────────────────────────────────────────────

function Historia() {

        <div className="two-col" style={{

              fontSize: "clamp(32px, 4vw, 48px)", fontWeight: 800,

            <div style={{ marginTop: 32, display: "flex", flexDirection: "column", gap: 18 }}>
              <p style={{ fontSize: 16, color: MUTED, lineHeight: 1.75, textWrap: "pretty" }}>

              <p style={{ fontSize: 16, color: MUTED, lineHeight: 1.75, textWrap: "pretty" }}>

              </p>
              <p style={{ fontSize: 16, color: MUTED, lineHeight: 1.75, textWrap: "pretty" }}>
                Más que vender autos, buscamos que la gente disfrute el proceso y vuelva a elegirnos.
              </p>
            </div>
          </div>

          {/* Right: photo placeholder */}
          <div style={{
            position: "relative",
            aspectRatio: "4 / 5",
            background: `linear-gradient(135deg, ${SECTION_BG} 0%, #D6EAF4 100%)`,
            border: `1px solid ${BORDER}`,
            borderRadius: 20,

            flexDirection: "column", gap: 12,
            boxShadow: "0 24px 60px rgba(14,16,32,0.10)",

function StatCard({ value, label }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        border: `1px solid ${hover ? SKY_BLUE : BORDER}`,
        borderRadius: 16, padding: "28px 24px",
        boxShadow: hover ? "0 12px 32px rgba(14,16,32,0.10)" : "none",
        background: "#fff",
        transition: "all 0.2s",
        display: "flex", flexDirection: "column", justifyContent: "space-between",
        minHeight: 160,
      }}
    >
      <div style={{
        fontSize: "clamp(36px, 4vw, 52px)", fontWeight: 800,
        color: NAVY, lineHeight: 1, letterSpacing: "-0.03em",
      }}>{value}</div>
      <div style={{
        marginTop: 16, fontSize: 13, color: MUTED, fontWeight: 500,
        letterSpacing: "0.02em", lineHeight: 1.4,
      }}>{label}</div>
    </div>
  );
}

// ─── Valores Section ──────────────────────────────────────────────────────────

function Valores() {
  const values = [
    {
      icon: <IconShield/>, title: "Transparencia total",
      desc: "Documentación 100% al día, historial claro y precios sin letra chica. Sabés exactamente lo que comprás.",

    {
      icon: <IconLightning/>, title: "Agilidad real",
      desc: "Respondemos por WhatsApp en minutos. Decisión, tasación y entrega sin trámites eternos.",
    },
    {
      icon: <IconMountain/>, title: "Raíces en Bariloche",
      desc: "Conocemos la región, los caminos y lo que cada auto necesita para andar en la Patagonia.",
    },
    {
      icon: <IconHeart/>, title: "Personas, no tickets",
      desc: "Atención cercana y trato directo. Nos importa que vuelvas a elegirnos cuando cambies de auto.",

        }}>
          {values.map(v => <ValueCard key={v.title} {...v}/>)}

      </div>

}

function ValueCard({ icon, title, desc }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        background: "#fff",
        border: `1px solid ${hover ? SKY_BLUE : BORDER}`,
        borderRadius: 16, padding: "32px 26px",
        boxShadow: hover ? "0 16px 40px rgba(14,16,32,0.12)" : "0 1px 2px rgba(14,16,32,0.03)",
        transition: "all 0.2s",
        transform: hover ? "translateY(-4px)" : "none",
        display: "flex", flexDirection: "column", gap: 18,
        height: "100%",

      <div style={{
        width: 48, height: 48, borderRadius: 12,

        display: "flex", alignItems: "center", justifyContent: "center",

      <h3 style={{ fontSize: 19, fontWeight: 700, color: NAVY, margin: 0, letterSpacing: "-0.01em" }}>
        {title}
      </h3>
      <p style={{ fontSize: 14, color: MUTED, lineHeight: 1.65, margin: 0, textWrap: "pretty" }}>
        {desc}
      </p>

// ─── Equipo Section ───────────────────────────────────────────────────────────

          <h2 style={{
            fontSize: "clamp(32px, 4vw, 48px)", fontWeight: 800,
            color: NAVY, lineHeight: 1.08, letterSpacing: "-0.02em", margin: 0,
            maxWidth: 720,
          }}>
            Las personas detrás de Raitzin.
          </h2>

function TeamCard({ initials, name, role, bio, isPet }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div

      style={{

// ─── Servicios Section ────────────────────────────────────────────────────────

function Servicios() {
  const services = [
    { label: "Compra y venta", desc: "Vehículos usados y semi-nuevos seleccionados, revisados y con documentación al día." },
    { label: "Financiación", desc: "Te ayudamos a armar el plan que te convenga: prendaria, bancaria o créditos personales." },
    { label: "Permuta", desc: "Recibimos tu auto como parte de pago. Tasación honesta y al instante." },

              <ServiceRow key={s.label} {...s} isLast={i === services.length - 1}/>

  const [hover, setHover] = React.useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: "grid", gridTemplateColumns: "auto 1fr",
        gap: 18,
        padding: "22px 0",
        borderBottom: isLast ? "none" : `1px solid ${BORDER}`,
        alignItems: "start",
        cursor: "pointer",
        transition: "background 0.15s",
      }}

      <div style={{
        width: 10, height: 10, borderRadius: "50%",
        background: BURGUNDY, marginTop: 8,
        boxShadow: `0 0 0 4px ${BURGUNDY}22`,

        <div style={{
          fontSize: 18, fontWeight: 700,

          {desc}
        </p>
      </div>
